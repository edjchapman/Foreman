# Shared app env — web, worker, and beat run the same image against the same
# Postgres + Redis. Anchored here so the three services stay in lockstep.
x-app-env: &app-env
  DATABASE_URL: postgres://foreman:foreman@db:5432/foreman
  REDIS_URL: redis://redis:6379/0
  DJANGO_DEBUG: "true"
  DJANGO_SECRET_KEY: dev-insecure
  DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: foreman
      POSTGRES_PASSWORD: foreman
      POSTGRES_DB: foreman
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foreman"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # One-shot: apply migrations, then exit. web/worker/beat gate on it completing so no
  # process ever boots against an unmigrated schema (the worker used to only wait on
  # Postgres being reachable, not migrated).
  migrate:
    build: .
    command: python manage.py migrate
    environment: *app-env
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    volumes:
      - ./:/app
      - /app/.venv  # anonymous volume: keep the image's venv, not a shadowing host .venv

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    environment: *app-env
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # Readiness (DB + broker) via stdlib only — no curl/wget assumption on the image.
      test:
        - CMD-SHELL
        - python -c "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/readyz').status==200 else 1)"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - ./:/app
      - /app/.venv  # anonymous volume: keep the image's venv, not a shadowing host .venv

  worker:
    build: .
    command: celery -A config worker -l info
    environment: *app-env
    # Ignore the image's HEALTHCHECK — it probes :8000/readyz, which only web serves.
    healthcheck:
      disable: true
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./:/app
      - /app/.venv  # anonymous volume: keep the image's venv, not a shadowing host .venv

  beat:
    build: .
    command: celery -A config beat -l info
    environment: *app-env
    # Ignore the image's HEALTHCHECK — it probes :8000/readyz, which only web serves.
    healthcheck:
      disable: true
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./:/app
      - /app/.venv  # anonymous volume: keep the image's venv, not a shadowing host .venv

volumes:
  pgdata:
