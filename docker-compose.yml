# Shared app env — web, worker, and beat run the same image against the same
# Postgres + Redis. Anchored here so the three services stay in lockstep.
x-app-env: &app-env
  DATABASE_URL: postgres://foreman:foreman@db:5432/foreman
  REDIS_URL: redis://redis:6379/0
  DJANGO_DEBUG: "true"
  DJANGO_SECRET_KEY: dev-insecure
  # `web` included so in-network scrapers (the observability profile's Prometheus
  # targets web:8000) pass Django's Host validation.
  DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0,web
  # Distributed tracing on for local dev — each process exports to the Jaeger service
  # below (view traces at http://localhost:16686). http:// scheme selects the insecure
  # gRPC channel. Prod sets these per-service via Terraform. See ADR 0008.
  OTEL_ENABLED: "true"
  OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: foreman
      POSTGRES_PASSWORD: foreman
      POSTGRES_DB: foreman
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foreman"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # All-in-one trace backend for local dev: receives OTLP and serves the UI. OTLP is the
  # only wire contract, so prod can swap this for any vendor by changing the endpoint.
  jaeger:
    image: jaegertracing/all-in-one:1.60
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"     # OTLP gRPC ingest

  # One-shot: apply migrations, then exit. web/worker/beat gate on it completing so no
  # process ever boots against an unmigrated schema (the worker used to only wait on
  # Postgres being reachable, not migrated).
  migrate:
    build: .
    command: python manage.py migrate
    environment: *app-env
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    volumes:
      - ./:/app
      - /app/.venv  # anonymous volume: keep the image's venv, not a shadowing host .venv

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    environment: *app-env
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # Readiness (DB + broker) via stdlib only — no curl/wget assumption on the image.
      test:
        - CMD-SHELL
        - python -c "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/readyz').status==200 else 1)"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - ./:/app
      - /app/.venv  # anonymous volume: keep the image's venv, not a shadowing host .venv

  worker:
    build: .
    command: celery -A config worker -l info
    environment: *app-env
    # Ignore the image's HEALTHCHECK — it probes :8000/readyz, which only web serves.
    healthcheck:
      disable: true
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      jaeger:
        condition: service_started
    volumes:
      - ./:/app
      - /app/.venv  # anonymous volume: keep the image's venv, not a shadowing host .venv

  beat:
    build: .
    command: celery -A config beat -l info
    environment: *app-env
    # Ignore the image's HEALTHCHECK — it probes :8000/readyz, which only web serves.
    healthcheck:
      disable: true
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      jaeger:
        condition: service_started
    volumes:
      - ./:/app
      - /app/.venv  # anonymous volume: keep the image's venv, not a shadowing host .venv

  # Push-dispatch: LISTENs for outbox NOTIFYs and dispatches instantly (ADR 0007).
  # Beat above stays as the fallback poll, so this is a latency optimization, not a
  # delivery dependency — the stack is correct with or without it.
  listener:
    build: .
    command: python manage.py outbox_listener
    environment: *app-env
    # Ignore the image's HEALTHCHECK — it probes :8000/readyz, which only web serves.
    healthcheck:
      disable: true
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      jaeger:
        condition: service_started
    volumes:
      - ./:/app
      - /app/.venv  # anonymous volume: keep the image's venv, not a shadowing host .venv

  # === Observability profile (opt-in: `make observe`) ===
  # Prometheus evaluates the committed alert/SLO rules against web's /metrics;
  # Grafana auto-provisions the dashboard. Profile-gated so `make up` is unchanged.
  prometheus:
    image: prom/prometheus:v3.5.0
    profiles: ["observability"]
    volumes:
      - ./observability/prometheus:/etc/prometheus:ro
    ports:
      - "9090:9090"
    depends_on:
      web:
        condition: service_healthy

  grafana:
    image: grafana/grafana:12.0.0
    profiles: ["observability"]
    environment:
      # Local-only convenience: no login wall in front of a localhost dashboard.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  pgdata:
