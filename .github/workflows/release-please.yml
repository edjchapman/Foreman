name: release-please

# Automated releases from Conventional Commits. release-please maintains a Release PR
# (CHANGELOG + version bump); merging it cuts a GitHub Release + tag, which then triggers
# a versioned image publish to GHCR.
#
# Token: a Release PR opened by the default GITHUB_TOKEN does NOT trigger other workflows,
# so under the main ruleset its required checks never report. RELEASE_PLEASE_TOKEN (a
# fine-grained PAT) makes the PR trigger CI normally; without it the action still runs but
# the PR must be re-triggered manually (close+reopen) to merge.

on:
  push:
    branches: [main]

permissions: {}

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          config-file: release-please-config.json
          manifest-file: .github/release-please-manifest.json

      # release-please bumps pyproject.toml + config/__init__.py but not uv.lock's
      # (virtual-root) version line, so the lock drifts a version behind on every
      # release. Regenerate it straight onto the Release PR branch so the bump ships
      # atomically. Runs after every regeneration in the same job (release-please
      # force-pushes the branch, then we re-add uv.lock), so it self-heals. The push
      # targets the PR branch — not main — so it never re-triggers release-please.
      - name: Check out the Release PR branch
        if: ${{ steps.release.outputs.pr }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ fromJSON(steps.release.outputs.pr).headBranchName }}
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
      - name: Set up uv
        if: ${{ steps.release.outputs.pr }}
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.12"
      - name: Sync uv.lock with the release version bump
        if: ${{ steps.release.outputs.pr }}
        run: |
          uv lock
          if git diff --quiet -- uv.lock; then
            echo "uv.lock already in sync with the version bump"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add uv.lock
          git commit -m "chore: sync uv.lock with the release version bump"
          git push

  publish-image:
    name: publish-image
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
      id-token: write # keyless Sigstore signing of the provenance attestation
      attestations: write # record the SLSA build provenance
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ghcr.io/edjchapman/foreman
          tags: |
            type=raw,value=${{ needs.release-please.outputs.version }}
            type=raw,value=latest
      - id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - name: Attest build provenance (SLSA)
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-name: ghcr.io/edjchapman/foreman
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  # Railway doesn't watch GHCR, so CD is explicit: pin each service to the new
  # semver tag and trigger a deployment (web first — its pre-deploy migrate and
  # /readyz healthcheck gate worker/beat). The deploy job itself lives in
  # deploy.yml (reused by the manual rollback path); the script logic in
  # scripts/railway-deploy.sh per the "CI calls make targets" convention.
  # See docs/deploy.md.
  deploy:
    name: deploy
    needs: [release-please, publish-image]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    permissions:
      contents: read
    uses: ./.github/workflows/deploy.yml
    with:
      version: ${{ needs.release-please.outputs.version }}
    secrets:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
