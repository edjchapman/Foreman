name: deploy

# Deploys an already-published image tag to Railway. Two entry points, one job:
#   - workflow_call — release-please.yml calls this after publishing the image,
#     so the deploy logic lives in exactly one place.
#   - workflow_dispatch — manual path for rollbacks (pick a previous version)
#     and for re-pinning after a `terraform apply` rebuild (service IDs change,
#     the platform boots on :latest until re-pinned).
# Same script either way: a GHCR pre-flight rejects unpublished tags, web
# deploys first and gates worker/beat behind pre-deploy migrate + /readyz,
# then worker/beat are polled to success too.
#
# After the rollout, a smoke gate verifies the live site: curl probes
# (health/readiness/metrics), then the Playwright e2e suite (demo flow over
# the WebSocket, CSV report, poison-job FAILED path). The deploy has already
# cut over by then — a red smoke step is the incident signal, and rollback
# stays manual (`make deploy VERSION=<previous>`; docs/deploy.md#rollback).

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Image tag to deploy (e.g. 0.7.0 — must exist on GHCR)"
        required: true
        type: string
      skip_smoke:
        description: "Skip the post-deploy smoke gate (emergency deploys only)"
        required: false
        default: false
        type: boolean
  workflow_call:
    inputs:
      version:
        description: "Image tag to deploy (must exist on GHCR)"
        required: true
        type: string
    secrets:
      RAILWAY_TOKEN:
        required: true

permissions: {}

jobs:
  deploy:
    name: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production # no protection rules — used for deployment history
    permissions:
      contents: read
    # Job-level (not workflow-level) so it also applies on the workflow_call
    # path: release + manual deploys never interleave.
    concurrency:
      group: railway-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Deploy to Railway
        env:
          VERSION: ${{ inputs.version }}
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_ENVIRONMENT_ID: ${{ vars.RAILWAY_ENVIRONMENT_ID }}
          RAILWAY_WEB_SERVICE_ID: ${{ vars.RAILWAY_WEB_SERVICE_ID }}
          RAILWAY_WORKER_SERVICE_ID: ${{ vars.RAILWAY_WORKER_SERVICE_ID }}
          RAILWAY_BEAT_SERVICE_ID: ${{ vars.RAILWAY_BEAT_SERVICE_ID }}
          # Optional (ADR 0007): empty until the listener service + repo variable exist,
          # in which case railway-deploy.sh skips it and Beat's poll dispatches.
          RAILWAY_LISTENER_SERVICE_ID: ${{ vars.RAILWAY_LISTENER_SERVICE_ID }}
        run: make deploy VERSION="$VERSION"

      # --- Post-deploy smoke gate (automates docs/deploy.md's checklist) ---
      # FOREMAN_E2E_URL is an optional repo variable. The || fallback matters:
      # an absent variable makes `env:` set an EMPTY string (present-but-empty),
      # which bash's ${VAR:-default} treats as unset but Python's
      # os.environ.get(VAR, default) does not — 0.15.0's gate failed exactly there.
      - name: Post-deploy smoke probes (health, readiness, metrics)
        if: ${{ !inputs.skip_smoke }}
        env:
          FOREMAN_E2E_URL: ${{ vars.FOREMAN_E2E_URL || 'https://foreman-demo.up.railway.app' }}
        run: ./deploy/scripts/smoke-check.sh
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        if: ${{ !inputs.skip_smoke }}
        with:
          python-version: "3.12"
      - name: Cache Playwright browsers
        if: ${{ !inputs.skip_smoke }}
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          # The browser build is pinned by the playwright package version, which
          # lives in uv.lock — a lock bump is exactly when the cache must refresh.
          key: playwright-${{ runner.os }}-${{ hashFiles('uv.lock') }}
      - name: Install Playwright system dependencies
        if: ${{ !inputs.skip_smoke }}
        run: uv run --group e2e playwright install-deps chromium
      - name: Post-deploy e2e (demo flow, WebSocket, report, poison path)
        if: ${{ !inputs.skip_smoke }}
        env:
          FOREMAN_E2E_URL: ${{ vars.FOREMAN_E2E_URL || 'https://foreman-demo.up.railway.app' }}
        run: make e2e
