name: deploy

# Deploys an already-published image tag to Railway. Two entry points, one job:
#   - workflow_call — release-please.yml calls this after publishing the image,
#     so the deploy logic lives in exactly one place.
#   - workflow_dispatch — manual path for rollbacks (pick a previous version)
#     and for re-pinning after a `terraform apply` rebuild (service IDs change,
#     the platform boots on :latest until re-pinned).
# Same script either way: a GHCR pre-flight rejects unpublished tags, web
# deploys first and gates worker/beat behind pre-deploy migrate + /readyz,
# then worker/beat are polled to success too.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Image tag to deploy (e.g. 0.7.0 — must exist on GHCR)"
        required: true
        type: string
  workflow_call:
    inputs:
      version:
        description: "Image tag to deploy (must exist on GHCR)"
        required: true
        type: string
    secrets:
      RAILWAY_TOKEN:
        required: true

permissions: {}

jobs:
  deploy:
    name: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production # no protection rules — used for deployment history
    permissions:
      contents: read
    # Job-level (not workflow-level) so it also applies on the workflow_call
    # path: release + manual deploys never interleave.
    concurrency:
      group: railway-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Deploy to Railway
        env:
          VERSION: ${{ inputs.version }}
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_ENVIRONMENT_ID: ${{ vars.RAILWAY_ENVIRONMENT_ID }}
          RAILWAY_WEB_SERVICE_ID: ${{ vars.RAILWAY_WEB_SERVICE_ID }}
          RAILWAY_WORKER_SERVICE_ID: ${{ vars.RAILWAY_WORKER_SERVICE_ID }}
          RAILWAY_BEAT_SERVICE_ID: ${{ vars.RAILWAY_BEAT_SERVICE_ID }}
        run: make deploy VERSION="$VERSION"
