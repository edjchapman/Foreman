name: commit-style

# Validate the PR title against the repository commit standard (CONTRIBUTING.md).
# The repo squash-merges every PR, so the PR TITLE becomes the permanent commit
# subject — that is the thing worth validating, not the per-branch WIP commits
# (which are squashed away). Gated to pull_request because the title only exists
# there; the tree-state `check.yml` workflow also runs on push and does not have it.
#
# Blocking: `--strict` makes a non-conforming subject fail, and this check is
# required by the `main` ruleset. The repo history already follows the standard;
# release-please (`chore(main): release …`) and Dependabot (`build(deps): …`,
# `ci(deps): …`) titles conform too, so automation is not blocked.

on:
  pull_request:
    branches: [main]
    # `edited` is not in the default event set, but this check validates the PR
    # TITLE — without it, fixing a rejected title never re-runs the (required)
    # check and the PR stays red until an unrelated push.
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: commit-style-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-title:
    name: validate PR title
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Validate PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: printf '%s\n' "$PR_TITLE" | ./scripts/check-commit-msg.sh --stdin --strict
