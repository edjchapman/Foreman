name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: lint + test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write # Codecov OIDC (tokenless upload)

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: foreman
          POSTGRES_PASSWORD: foreman
          POSTGRES_DB: foreman
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U foreman"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://foreman:foreman@localhost:5432/foreman
      DJANGO_SECRET_KEY: ci-secret

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync
      - name: Apply migrations (validates against Postgres)
        run: uv run python manage.py migrate
      - name: Lint + test
        run: make ci
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          files: ./coverage.xml
          use_oidc: true
          fail_ci_if_error: true # a failed upload reddens CI rather than silently dropping coverage

  terraform:
    name: terraform validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_wrapper: false
          terraform_version: 1.15.7 # match the operator's local CLI; module caps at < 2.0
      - name: fmt + validate the platform module
        run: make tf-check

  image:
    name: docker build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      # The production image is otherwise built only on release (publish-image in
      # release-please.yml). Building it here — same `docker build`, so its collectstatic
      # RUN executes — catches base-image / venv regressions (e.g. a Dependabot Python
      # bump that mismatches builder vs runtime, #90/#101) at PR time, not at release.
      - name: Build the release image (no push)
        run: make image
