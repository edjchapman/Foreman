name: audit

# Dependency vulnerability audit (pip-audit). Kept separate from ci.yml on purpose:
# it is network-dependent (queries the OSV / PyPI advisory DB) and must run on a
# SCHEDULE, so a CVE disclosed after a merge reddens CI even with zero code change.
# `make ci` stays offline + deterministic.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Mondays 09:00 UTC — matches the repo's other scheduled jobs; re-audits the locked deps weekly.
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # event_name in the group so a scheduled run can never cancel an in-flight push run
  group: audit-${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: pip-audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          python-version: "3.12"
      - name: Audit dependencies
        run: make audit
